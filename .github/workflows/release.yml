name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.package_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_suffix: windows-x64-vs2026
            runner: windows-latest
            cmake_args: -DLABELPRINT_BUILD_DEMO=OFF
          - package_suffix: windows-x64-vs2022-win7
            runner: windows-2022
            cmake_args: -DLABELPRINT_BUILD_DEMO=OFF -DLABELPRINT_WIN7_COMPAT=ON -DLABELPRINT_STATIC_MSVC_RUNTIME=ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake (Release)
        run: cmake -S . -B build -A x64 ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ./build/Release/test_runner.exe

      - name: Package release artifact
        shell: pwsh
        run: |
          $name = "labelprint-${{ github.ref_name }}-${{ matrix.package_suffix }}"
          cmake --install build --config Release --prefix release
          Compress-Archive -Path release/* -DestinationPath "$name.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LabelPrint ${{ github.ref_name }}"
          body: |
            ## LabelPrint ${{ github.ref_name }}

            Static library + headers for Windows x64.

            ### Artifacts
            - `windows-x64-vs2026`: normal Windows x64 build.
            - `windows-x64-vs2022-win7`: Windows 7 compatible build, compiled with `WINVER=0x0601`, `_WIN32_WINNT=0x0601`, and the static MSVC runtime.

            ### Usage
            ```
            #include "labelprint/labelprint.h"
            // CMake: find_package(LabelPrint CONFIG REQUIRED)
            //        target_link_libraries(app PRIVATE LabelPrint::labelprint)
            ```

            See [API.md](${{ github.server_url }}/${{ github.repository }}/blob/main/API.md) for full documentation.
          files: labelprint-*.zip
